
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>থ্রিডি ভি-টিউব প্রো - হট ভিডিও</title>
    
    <style>
        /* --- গ্লোবাল স্টাইল --- */
        body { background-color: #000000; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background-color: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e53935; }
        header h1 { margin: 0; color: #e53935; font-size: 22px; }

        /* --- নোটিশ --- */
        .notice-container { padding: 10px; }
        .notice-bar {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 12px; text-align: center; border-radius: 10px; font-weight: bold; font-size: 14px;
        }

        /* --- ভিডিও গ্রিড --- */
        main { padding: 15px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .video-card { background-color: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; position: relative; cursor: pointer; }
        .video-card img { width: 100%; height: 110px; object-fit: cover; }
        
        .video-info { padding: 8px; }
        .video-title { font-size: 13px; font-weight: 500; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 110px; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; }
        .play-icon { font-size: 30px; color: white; opacity: 0.8; }

        /* --- ভিডিও প্লেয়ার --- */
        #video-player-section { display: none; padding: 15px; text-align: center; }
        .video-container { max-width: 100%; background: #000; border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: auto; outline: none; }
        #back-btn { margin-top: 20px; background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        /* --- ভেরিফিকেশন পপআপ --- */
        .modal-overlay { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 10px; text-align: center; width: 85%; max-width: 350px; border: 2px solid #e53935; }
        .verify-box { background: #fff; color: #000; padding: 15px; margin: 20px 0; border-radius: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .verify-box input { transform: scale(1.5); }
    </style>
</head>
<body>

    <header>
        <h1>থ্রিডি ভি-টিউব প্রো</h1>
        <div style="font-size: 20px;">🔍 ☰</div>
    </header>

    <div class="notice-container">
        <div class="notice-bar">২৪ ঘন্টার জন্য অ্যাড-ফ্রি ভিডিও দেখতে বক্সে টিক দিন!</div>
    </div>

    <!-- ভিডিও লিস্ট এরিয়া -->
    <main id="main-area">
        <div class="video-grid" id="video-container">
            <p style="text-align: center; width: 100%; padding: 50px;">ভিডিও লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</p>
        </div>
    </main>

    <!-- প্লেয়ার এরিয়া -->
    <section id="video-player-section">
        <div class="video-container">
            <video id="main-video-player" controls controlsList="nodownload"></video>
        </div>
        <button id="back-btn" onclick="goBack()">⬅️ ব্যাকে যান</button>
    </section>

    <!-- ভেরিফিকেশন পপআপ -->
    <div id="verificationModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: #ff5252; margin-top: 0;">মানবিক যাচাই</h2>
            <p>ভিডিওটি চালু করতে নিচের বক্সে টিক দিন</p>
            <div class="verify-box">
                <input type="checkbox" id="humanCheck" onclick="verifyHuman()">
                <label for="humanCheck">I am not a robot</label>
            </div>
            <button onclick="closeModal()" style="background: none; border: none; color: #888; cursor: pointer;">বন্ধ করুন</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // ১. আপনার দেওয়া কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyArUnLdrmx0d1hSc05o7H2QpediJAarIv8",
            authDomain: "dhotmovie-7e866.firebaseapp.com",
            projectId: "dhotmovie-7e866",
            storageBucket: "dhotmovie-7e866.firebasestorage.app",
            messagingSenderId: "180510780394",
            appId: "1:180510780394:web:3b80f5f43b78375436e093",
            measurementId: "G-EFTD6TJ43J"
        };

        // ২. ফায়ারবেস ইনিশিয়ালাইজ
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let selectedVideoUrl = "";

        // ৩. ভিডিও ডাটা লোড করা
        function fetchVideos() {
            const container = document.getElementById('video-container');

            db.collection("videos").get().then((querySnapshot) => {
                container.innerHTML = ""; // লোডিং টেক্সট মুছুন

                if (querySnapshot.empty) {
                    container.innerHTML = "<p>কোনো ভিডিও পাওয়া যায়নি।</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => openVideo(data.videoUrl);
                    
                    card.innerHTML = `
                        <img src="${data.thumbnail}" onerror="this.src='https://via.placeholder.com/160x110?text=No+Thumb'">
                        <div class="play-overlay"><div class="play-icon">▶️</div></div>
                        <div class="video-info">
                            <div class="video-title">${data.title}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }).catch((error) => {
                console.error("Error fetching data: ", error);
                container.innerHTML = "<p>ডাটাবেস কানেকশন এরর!</p>";
            });
        }

        // ৪. ভিডিও ওপেন করার লজিক
        function openVideo(url) {
            selectedVideoUrl = url;
            // ভেরিফিকেশন চেক
            if (localStorage.getItem('user_verified') === 'true') {
                startPlayback(url);
            } else {
                document.getElementById('verificationModal').style.display = 'flex';
            }
        }

        // ৫. ভেরিফিকেশন ফাংশন
        function verifyHuman() {
            if (document.getElementById('humanCheck').checked) {
                setTimeout(() => {
                    localStorage.setItem('user_verified', 'true');
                    document.getElementById('verificationModal').style.display = 'none';
                    startPlayback(selectedVideoUrl);
                }, 500);
            }
        }

        // ৬. প্লেয়ার চালু করা
        function startPlayback(url) {
            document.getElementById('main-area').style.display = 'none';
            document.getElementById('video-player-section').style.display = 'block';
            const videoElement = document.getElementById('main-video-player');
            videoElement.src = url;
            videoElement.play();
        }

        // ৭. ব্যাকে আসা
        function goBack() {
            const videoElement = document.getElementById('main-video-player');
            videoElement.pause();
            document.getElementById('video-player-section').style.display = 'none';
            document.getElementById('main-area').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('verificationModal').style.display = 'none';
            document.getElementById('humanCheck').checked = false;
        }

        // পেজ লোড হলে ভিডিও ডাটা আনো
        window.onload = fetchVideos;
    </script>
</body>
</html>
